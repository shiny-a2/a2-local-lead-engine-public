# Country + city registry for lead collection.
# City names use the English (name:en) form; the OSM connector matches either the
# local OSM `name` or `name:en`, so these resolve worldwide. "big" = major metros,
# "small" = smaller cities/towns (still real administrative areas with businesses).
countries:
  "New Zealand":
    code: NZ
    timezone: Pacific/Auckland
    big: [Auckland, Wellington, Christchurch, Hamilton, Tauranga, Dunedin]
    small: [Napier, Palmerston North, Nelson, Rotorua, New Plymouth, Whangarei, Invercargill, Gisborne, Timaru, Masterton, Blenheim, Queenstown]

